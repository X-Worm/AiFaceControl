# Internal app nginx: serves the static door page and proxies /start to the bot.
# In production this sits behind your TLS-terminating reverse proxy; locally it is
# published on :8080 by docker-compose so the page and /start share one origin.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # POST /start → Pipecat bot (creates the Daily room, returns room url + token)
    location = /start {
        proxy_pass http://bot:7860;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
